app:
  name: SDVN Klein Upscale Ultimate
input:
  note:
    ui:
      type: note
      markdown: >-
        | *Phân phối duy nhất tại*
        [hungdiffusion.com](https://hungdiffusion.com/workflow-upscale/)


        | *Workflow này chỉ tương thích với bản google colab được thiết kế riêng
        hoặc máy local cài đúng model/node theo hướng dẫn*
  checkpoint:
    id: 53-Ckpt_name
    ui:
      type: checkpoints
      label: Checkpoint
      value: Flux2-klein-9b.safetensors
  note_2:
    ui:
      type: note
      markdown: "| Tải checkpoint Klein [tại
        đây](https://huggingface.co/StableDiffusionVN/Flux2/blob/main/Checkpoin\
        t/Flux2-klein-9b.safetensors)"
  lora:
    id: 54-lora_name
    ui:
      type: menu
      label: Lora
      choices:
        - Default:[SDVN]_Upscale_Klein-9b_v1.safetensors
        - Product:[SDVN]_Upscale_Product_Klein-9b_v1.safetensors
        - Architecture:[SDVN]_Upscale_Arc_Klein-9b_v1.safetensors
      menuLabelSyntax: true
      value: "[SDVN]_Upscale_Klein-9b_v1.safetensors"
  strength_lora:
    id: 54-strength_model
    ui:
      type: float
      label: Strength Lora
      minimum: 0
      maximum: 1
      step: 0.1
      value: 0.8
  upscale_image:
    id: 7-image
    ui:
      type: image
      label: Upscale Image
  upscale_size:
    id: 57-Menu
    ui:
      type: menu
      label: Upscale Size
      choices:
        - "1024"
        - "1536"
        - "1920"
        - "2048"
        - "3800"
        - "4000"
        - "5600"
        - "6000"
        - "7400"
        - "8000"
        - "9200"
        - "10000"
      value: "2048"
  custom_prompt:
    id: 60-value
    ui:
      type: string
      label: Custom Prompt
  color_match:
    id: 40-method
    ui:
      type: menu
      label: Color Match
      choices:
        - wavelet
        - mkl
      value: wavelet
  blend:
    id: 40-blend
    ui:
      type: float
      label: Blend
      minimum: 0
      maximum: 1
      step: 0.1
      value: 1
  seed:
    id: 9-seed
    ui:
      type: seed
      label: Seed
      minimum: 0
      step: 1
      value: random_seed
output:
  output_image:
    id: "61"
    ui:
      type: image
      label: Output image
