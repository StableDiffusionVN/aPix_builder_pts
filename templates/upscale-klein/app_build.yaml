app:
  name: SDVN Upscale Klein
input:
  lora_upscale:
    id: 268-lora_name
    ui:
      type: menu
      label: Lora upscale
      choices:
        - None
        - "[SDVN]_Upscale_Klein-9b_v1.safetensors"
        - "[SDVN]_Upscale_Arc_Klein-9b_v1.safetensors"
        - "[SDVN]_Upscale_Product_Klein-9b_v1.safetensors"
      value: "[SDVN]_Upscale_Klein-9b_v1.safetensors"
  anh_upscale:
    id: 258-image
    ui:
      type: image
      label: Ảnh upscale
  color_match:
    id: 263-method
    ui:
      type: menu
      label: Color Match
      choices:
        - wavelet
        - mkl
      value: wavelet
  blend:
    id: 263-blend
    ui:
      type: float
      label: Blend
      minimum: 0
      maximum: 1
      step: 0.05
      display: slider
      value: 1
  seed:
    id: 283-seed
    ui:
      type: seed
      label: Seed
      minimum: 0
      step: 1
      value: random_seed
output:
  anh_upscale:
    id: "34"
    ui:
      type: image
      label: Ảnh upscale
