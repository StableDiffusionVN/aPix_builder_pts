app:
  name: SDVN Klein Upscale Ultimate
input:
  note:
    ui:
      type: note
      markdown: "*Đăng ký workflow tại*
        [hungdiffusion.com](https://hungdiffusion.com/workflow-upscale/) *và
        liên hệ để cấp quyền sử dụng ID RunningHub* "
  hinh_anh_upscale:
    id: 7-image
    ui:
      type: image
      label: Hình ảnh Upscale
  lora_upscale:
    id: 6-lora_name
    ui:
      type: menu
      label: Lora Upscale
      choices:
        - Default:upsacle_200_9b_8k.safetensors
        - Product:SDVN_Upscale_Product_Klein-9b_v1.safetensors
        - Architecture:sdvn_arc_upsacle_9b.safetensors
      menuLabelSyntax: true
      value: upsacle_200_9b_8k.safetensors
  lora_strength:
    id: 6-strength_model
    ui:
      type: float
      label: Lora Strength
      minimum: 0
      maximum: 1
      step: 0.1
      value: 0.8
  upscale_size:
    id: 31-Menu
    ui:
      type: menu
      label: Upscale Size
      choices:
        - "1024"
        - "1536"
        - "1920"
        - "2048"
        - "3800"
        - "4000"
        - "5600"
        - "6000"
        - "7400"
        - "8000"
        - "9200"
        - "10000"
      value: "2048"
  custom_prompt:
    id: 45-input
    ui:
      type: string
      label: Custom Prompt
  color_match:
    id: 40-method
    ui:
      type: menu
      label: Color Match
      choices:
        - wavelet
        - mkl
      value: wavelet
  blend:
    id: 40-blend
    ui:
      type: int
      label: Blend
      minimum: 0
      maximum: 1
      step: 0.1
      value: 1
runninghub:
  workflowId: "2063783833924890626"
