            </span>
            aPix Builder
          </h2>
          <div id="executionModeToggle" class="modeTabs" role="tablist" aria-label="Run mode">
            <button type="button" class="active" data-mode="local" role="tab" aria-selected="true" title="ComfyUI Local">ComfyUI</button>
            <button type="button" data-mode="runninghub-wf" role="tab" aria-selected="false" title="RunningHub Workflow">RH Wf</button>
            <button type="button" data-mode="runninghub-app" role="tab" aria-selected="false" title="RunningHub App">RH App</button>
          </div>
        </div>
        <select id="executionModeSelect" hidden aria-hidden="true">
          <option value="local">ComfyUI Local</option>
          <option value="runninghub-wf">RunningHub Workflow</option>
          <option value="runninghub-app">RunningHub AI App</option>
        </select>

        <section class="section">
          <div class="sectionHeader">
            <h2>Settings</h2>
            <button id="settingsToggleBtn" class="iconButton" type="button" title="Hide settings" aria-label="Hide settings">▲</button>
          </div>
          <div id="settingsBody" class="settingsBody">
            <div class="inputWithBtn">
              <input id="serverUrlInput" type="password" placeholder="http://127.0.0.1:8188" autocomplete="off" />
              <button id="toggleServerUrlBtn" class="iconButton" type="button" title="Show server address" aria-label="Show server address">○</button>
              <button id="testConnectionBtn" class="iconButton" type="button" title="Test connection" aria-label="Test connection">✓</button>
            </div>
            <div id="runningHubSettings" class="runningHubSettings" hidden>
              <div class="field">
                <span>RunningHub API Key</span>
                <div class="inputWithBtn">
                  <input id="runningHubApiKeyInput" type="password" placeholder="API key" autocomplete="off" />
                  <button id="toggleRunningHubApiKeyBtn" class="iconButton" type="button" title="Show API key" aria-label="Show API key">○</button>
                </div>
              </div>
              <div id="runningHubAppSettings" class="runningHubAppSettings" hidden>
                <label class="field rhAppField">
                  <span>Web App</span>
                  <div class="rhAppSelectRow">
                    <select id="runningHubAppSelect"></select>
                    <button id="loadRunningHubNodesBtn" class="iconButton" type="button" title="Reload RunningHub nodes" aria-label="Reload RunningHub nodes">↻</button>
                  </div>
                </label>
                <label id="runningHubCustomWebappField" class="field" hidden>
                  <span>Custom WebApp ID</span>
                  <input id="runningHubCustomWebappIdInput" type="text" placeholder="2039924771751731201" />
                </label>
              </div>
            </div>
            <div id="localWorkflowSettings" class="localWorkflowSettings">
              <div class="sectionHeader compactHeader">
                <h2>Workflow</h2>
                <div class="row">
                  <button id="refreshTemplatesBtn" class="iconButton" type="button" title="Reload templates" aria-label="Reload templates">↻</button>
                  <button id="chooseTemplateFolderBtn" class="secondary compactButton" type="button">Folder</button>
                  <button id="chooseTemplateZipBtn" class="secondary compactButton" type="button">.zip</button>
                </div>
              </div>
              <label class="field">
                <span>Template</span>
                <select id="templateSelect"></select>
              </label>
            </div>
          </div>
        </section>

        <section class="section workflowSection">
          <div class="sectionHeader workflowSectionHeader">
            <h2 id="workflowTitle">Inputs</h2>
          </div>
          <form id="dynamicForm"></form>
        </section>

      </div>

      <section class="section stickyFooter">
        <div class="progressWrap">
          <div id="statusText" class="statusText">Ready</div>
          <progress id="progressBar" value="0" max="1" hidden></progress>
        </div>
        <div class="row">
          <button id="runBtn" class="primary" type="button" data-action="run">Run</button>
          <button id="cancelBtn" class="danger" type="button" disabled>Cancel</button>
        </div>
      </section>
    </div>
  </body>
</html>
